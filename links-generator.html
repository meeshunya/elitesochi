<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор ссылок Telegram</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Генератор ссылок Telegram</h1>
        </header>
        
        <!-- Переключатель режима -->
        <section class="mode-section">
            <label class="section-label">Режим отправки</label>
            <div class="mode-options">
                <label class="mode-option">
                    <input type="radio" name="mode" value="text" checked>
                    <span class="mode-btn">Без медиа</span>
                </label>
                <label class="mode-option">
                    <input type="radio" name="mode" value="photo">
                    <span class="mode-btn">Фото</span>
                </label>
                <label class="mode-option">
                    <input type="radio" name="mode" value="video">
                    <span class="mode-btn">Видео</span>
                </label>
            </div>
        </section>

        <!-- Основные поля -->
        <section class="form-section">
            <div class="form-group">
                <label for="botToken">Bot Token</label>
                <input type="text" id="botToken" placeholder="123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11">
            </div>

            <div class="form-group">
                <label for="chatId">Chat ID</label>
                <input type="text" id="chatId" placeholder="-1001234567890">
            </div>

            <div class="form-group">
                <label for="postText">Текст поста</label>
                <div class="formatting-toolbar">
                    <button type="button" class="format-btn" data-tag="b" title="Жирный (Ctrl+B)">
                        <span class="format-icon">B</span>
                    </button>
                    <button type="button" class="format-btn" data-tag="i" title="Курсив (Ctrl+I)">
                        <span class="format-icon italic">I</span>
                    </button>
                    <button type="button" class="format-btn" data-tag="u" title="Подчёркнутый (Ctrl+U)">
                        <span class="format-icon underlined">U</span>
                    </button>
                    <button type="button" class="format-btn" data-tag="s" title="Зачёркнутый">
                        <span class="format-icon strikethrough">S</span>
                    </button>
                    <button type="button" class="format-btn" data-tag="spoiler" title="Спойлер">
                        <span class="format-icon">Spoiler</span>
                    </button>
                    <div class="format-divider"></div>
                    <button type="button" class="format-btn" data-tag="code" title="Моноширинный">
                        <span class="format-icon mono">&lt;/&gt;</span>
                    </button>
                    <button type="button" class="format-btn" data-tag="pre" title="Блок кода">
                        <span class="format-icon mono">Code</span>
                    </button>
                    <button type="button" class="format-btn" data-tag="blockquote" title="Цитата">
                        <span class="format-icon quote">Quote</span>
                    </button>
                </div>
                <textarea id="postText" placeholder="Введите текст поста..." rows="6"></textarea>
                <div class="char-counter" id="charCounter">
                    <span class="char-count" id="charCount">0</span>
                    <span class="char-max">/ <span id="charLimit">4096</span></span>
                </div>
            </div>

            <!-- Поле FILE_ID -->
            <div class="form-group hidden" id="fileIdGroup">
                <label for="fileId">File ID</label>
                <div class="fileid-row">
                    <input type="text" id="fileId" placeholder="AgACAgIAAxkBAAI...">
                    <button type="button" id="jsonParseBtn" class="json-btn" title="Извлечь из JSON">
                        <span>{ }</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- Чекбокс для кнопки -->
        <section class="checkbox-section">
            <label class="checkbox-label">
                <input type="checkbox" id="withButton">
                <span class="checkbox-custom"></span>
                <span>Добавить кнопку</span>
            </label>
        </section>

        <!-- Дополнительные поля для кнопки -->
        <section class="button-section hidden" id="buttonFields">
            <div class="form-group">
                <label for="buttonText">Текст на кнопке</label>
                <input type="text" id="buttonText" placeholder="Нажать">
            </div>

            <div class="form-group">
                <label for="buttonUrl">Ссылка в кнопке</label>
                <input type="text" id="buttonUrl" placeholder="https://t.me/username">
            </div>

            <div class="form-group optional">
                <label for="prefilledText">Предзаполненный текст</label>
                <input type="text" id="prefilledText" placeholder="Текст для отправки в чат">
                <small>Текст, который будет предзаполнен при нажатии кнопки</small>
            </div>
        </section>

        <!-- Поле вывода ссылки -->
        <section class="output-section">
            <div class="form-group">
                <label for="outputLink">Ссылка на создание поста</label>
                <textarea id="outputLink" readonly rows="3" placeholder="Заполните обязательные поля..."></textarea>
                <div class="action-buttons">
                    <button type="button" id="copyBtn" class="action-btn primary hidden">Копировать</button>
                    <button type="button" id="resetBtn" class="action-btn secondary">Сбросить</button>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
